name: Build ActivityLauncher v8

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: Upstream ActivityLauncher branch or tag
        required: true
        default: master
        type: string
      version_name:
        description: APK versionName
        required: true
        default: 8.0.0
        type: string
      version_code:
        description: APK versionCode
        required: true
        default: "8"
        type: string
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: activitylauncher-v8-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION_NAME: ${{ inputs.version_name || '8.0.0' }}
      VERSION_CODE: ${{ inputs.version_code || '8' }}
      APPID: ${{ vars.ACTIVITY_LAUNCHER_APP_ID || 'de.szalkowski.activitylauncher' }}
      KNOX_KPE_LICENSE_KEY: ${{ secrets.KNOX_KPE_LICENSE_KEY }}
      KEYSTORE_BASE64: ${{ secrets.ACTIVITY_LAUNCHER_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ACTIVITY_LAUNCHER_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ACTIVITY_LAUNCHER_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ACTIVITY_LAUNCHER_KEY_PASSWORD }}

    steps:
      - name: Checkout builder
        uses: actions/checkout@v4

      - name: Download upstream ActivityLauncher
        uses: actions/checkout@v4
        with:
          repository: ActivityLauncher/ActivityLauncher
          ref: ${{ inputs.upstream_ref || 'master' }}
          path: upstream
          fetch-depth: 1

      - name: Apply ActivityLauncher patch
        working-directory: upstream
        shell: bash
        run: |
          git apply --check ../patches/activitylauncher.patch
          git apply --whitespace=nowarn ../patches/activitylauncher.patch
          git diff --check

      - name: Prepare optional release signing
        shell: bash
        run: |
          if [[ -n "$KEYSTORE_BASE64" ]]; then
            if [[ -z "$KEYSTORE_PASSWORD" || -z "$KEY_ALIAS" || -z "$KEY_PASSWORD" ]]; then
              echo "::error::Release keystore is configured but its password or alias secret is missing."
              exit 1
            fi
            keystore_path="$RUNNER_TEMP/activitylauncher-release.jks"
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
            echo "KEYSTORE=$keystore_path" >> "$GITHUB_ENV"
            echo "BUILD_TASK=assembleOssNoadsRelease" >> "$GITHUB_ENV"
            echo "PLUGIN_BUILD_TASK=:rootlaunchplugin:assembleRelease" >> "$GITHUB_ENV"
            echo "BUILD_KIND=signed release" >> "$GITHUB_ENV"
          else
            echo "BUILD_TASK=assembleOssNoadsDebug" >> "$GITHUB_ENV"
            echo "PLUGIN_BUILD_TASK=:rootlaunchplugin:assembleDebug" >> "$GITHUB_ENV"
            echo "BUILD_KIND=debug" >> "$GITHUB_ENV"
            if [[ -n "$KNOX_KPE_LICENSE_KEY" ]]; then
              echo "::warning::KPE activation is signature-bound; configure a stable release keystore."
            fi
          fi

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify and build APKs
        working-directory: upstream
        shell: bash
        run: |
          ./gradlew --no-daemon spotlessCheck testOssNoadsDebugUnitTest "$BUILD_TASK" "$PLUGIN_BUILD_TASK" \
            -PactivityLauncherVersionName="$VERSION_NAME" \
            -PactivityLauncherVersionCode="$VERSION_CODE"

      - name: Locate APKs
        id: apk
        working-directory: upstream
        shell: bash
        run: |
          app_path="$(find app/build/outputs/apk -type f -name '*.apk' | sort | head -n 1)"
          plugin_path="$(find rootlaunchplugin/build/outputs/apk -type f -name '*.apk' | sort | head -n 1)"
          test -n "$app_path"
          test -n "$plugin_path"
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
          echo "plugin_path=$plugin_path" >> "$GITHUB_OUTPUT"
          echo "App APK: $app_path"
          echo "Root plugin APK: $plugin_path"

      - name: Publish GitHub Release
        working-directory: upstream
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          safe_version="${VERSION_NAME//[^0-9A-Za-z._-]/-}"
          tag="v${safe_version}-build.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          app_file="ActivityLauncher-v8-${safe_version}-${GITHUB_RUN_NUMBER}.apk"
          plugin_file="ActivityLauncher-RootPlugin-${safe_version}-${GITHUB_RUN_NUMBER}.apk"
          cp "${{ steps.apk.outputs.app_path }}" "$app_file"
          cp "${{ steps.apk.outputs.plugin_path }}" "$plugin_file"
          gh release create "$tag" "$app_file" "$plugin_file" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "ActivityLauncher v8 ${VERSION_NAME} (${GITHUB_RUN_NUMBER})" \
            --notes "Built from ActivityLauncher/ActivityLauncher ref ${{ inputs.upstream_ref || 'master' }} with the act_lun patch. Build type: $BUILD_KIND. Install the host APK first and then the same-signature RootPlugin APK. Knox KPE activation requires a valid key bound to this package name and signing certificate."
